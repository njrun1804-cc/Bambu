  - all_outputs_are_review_artifacts_until_explicit_print_approval
review_outputs:
  directory: outputs/review/world-cup-neighbors-v4
  report: outputs/review/world-cup-neighbors-v4/review-report.json
  contact_sheet: outputs/review/world-cup-neighbors-v4/visual-contact-sheet.png
