required_views:
  - front
  - front-angle
  - top
  - dan-head
  - carrie-head
  - low-front
minimum_scores:
  same_ballpark: 7
  face_readability: 7
  toy_style: 7
  print_safety: 6
hard_gates:
  - contact_sheet_must_compare_target_crops_to_current_views
