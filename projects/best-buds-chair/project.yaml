schema_version: 2
slug: best-buds-chair
intent: Woman with glasses and tri-color dog on patio chair diorama — Best Buds
privacy: private
lane: hybrid
mesh_strategy: scene
archetype: seated_diorama
status: cad
current_revision: v1
next_safe_action: >-
  Patio reference photo is installed and confirmed. Run the photo-first scene
  pipeline: `export MESHY_API_KEY=msy_...` then `uv run bambu pipeline run
  projects/best-buds-chair --force-meshy --no-render`. This runs meshy concept
  (--mode photo, auto prompt fallback) → meshy scene → scale-to-bed →
  release-check → slice. No fuse-mesh, no head crops, no mid-run prompts.
printer:
  model: Bambu Lab A1 mini
  build_volume_mm: [180, 180, 180]
  nozzle_mm: 0.4
material:
  name: Bambu PLA Basic
  type: PLA
  color: green
  owned: true
plate:
  name: Bambu Textured PEI Plate
  side: textured
constraints:
  dimensions_mm: [118, 65, 68]
  tolerance_notes: Envelope from seated_diorama archetype profile
manual_gates:
  - design_check
  - release_check
  - render_approval
  - slicer_review
  - print_start
source_files:
  - source/v1/model.py
