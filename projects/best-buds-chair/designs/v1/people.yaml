schema_version: 2
people:
  - id: woman
    name: Woman
    role: seated_primary
    target_height_mm: 46
    head_mm: {width: 20.0, height: 21.0}
    torso_mm: {width: 17.0, height: 14.0}
    silhouette:
      pose: seated_right_arm_on_dog
      build: average
    likeness_cues:
      - rectangular glasses ridge
      - layered swept hair cap with groove cues
      - warm smile engraved on jaw
      - seated on patio chair, arm reaching to dog
    print_safe_face:
      glasses: open_rectangular_ridge_with_engraved_pupils
      hair: solid_swept_cap
      smile: engraved_broad_arc
    review:
      face_center: [20, 2, 50.5]
  - id: dog
    name: Dog
    role: lap_companion
    target_height_mm: 24
    head_mm: {width: 21.0, height: 21.0}
    likeness_cues:
      - oversized head relative to body
      - floppy ears fused into skull
      - tri-color face mask engrave cues
      - white chest patch paint zone
    print_safe_face:
      ears: fused_floppy_capsules
      nose: raised_front_bump
    review:
      face_center: [0, -4, 26]
shared_rules:
  face_style: rounded chibi heads, broad low-relief landmarks
  no_photorealism: true
  minimum_face_feature_width_mm: 1.2
  forbid:
    - separate eyeglass frames
    - thin dog legs
    - hair strands as free geometry
