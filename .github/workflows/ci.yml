name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: shared-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repo-check:
    uses: njrun1804-cc/engineering-control-plane/.github/workflows/repo-check.yml@d7f8ec4e1b24f562cacb65901486f6429d2c481a
    with:
      profile: bambu
